<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Books</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', path='favicon.ico') }}">
</head>
<body>
<div class="layout">
    {% include 'navbar.html' %}
    <div class="container">
        <h1>Book Search</h1>
        <form method="get" action="/search" id="searchForm">
		<div class="autocomplete-wrapper">
			<label for="query">Search Terms:</label>
			<input type="text" id="query" name="query" value="{{ query or '' }}" 
				   placeholder="Enter title, author, or keywords..." 
				   autocomplete="off">
			<div id="autocomplete-suggestions" class="autocomplete-suggestions"></div>
		</div>

			<label for="subjects">Filter by Subjects:</label>
			<div class="filter-help">Select up to 3 subjects</div>
            <div id="subject-input-container">
                <input type="text" id="subject-input" placeholder="Start typing a subject..." autocomplete="off">
                <div id="subject-suggestions" class="suggestions-box"></div>
            </div>
            <div id="subject-pills" class="pill-container"></div>
            <input type="hidden" name="subjects" id="fav_subjects-hidden" value="{{ subjects or '' }}">

            <button type="submit" class="btn btn--primary">Search</button>
        </form>

        <h2>Results</h2>
        <div id="search-results"></div>
        <div class="pagination-buttons">
            <button id="prevButton" class="btn btn--secondary btn--sm" style="display: none;">Previous</button>
            <button id="nextButton" class="btn btn--secondary btn--sm" style="display: none;">Next</button>
        </div>

<script>
    const booksContainer = document.getElementById("search-results");
    const prevBtn = document.getElementById("prevButton");
    const nextBtn = document.getElementById("nextButton");

    let currentPage = {{ current_page }};
    let hasNext = {{ has_next | tojson }};
    let hasPrev = {{ has_prev | tojson }};

    function escapeHtml(unsafe) {
      if (unsafe == null) return "";
      return String(unsafe)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function placeholderDataURI(titleText = "No cover") {
      const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="150" height="220" viewBox="0 0 150 220">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f1f1f1"/>
            <stop offset="100%" stop-color="#e7e7e7"/>
          </linearGradient>
        </defs>
        <rect width="150" height="220" fill="url(#g)" />
        <rect x="10" y="10" width="130" height="200" rx="6" ry="6" fill="none" stroke="#cfcfcf" stroke-dasharray="6 4" />
        <text x="75" y="110" font-size="18" text-anchor="middle" fill="#7a7a7a" font-family="Arial, sans-serif">No cover</text>
        <text x="75" y="132" font-size="10" text-anchor="middle" fill="#9a9a9a" font-family="Arial, sans-serif">
          ${escapeHtml(titleText).slice(0, 26)}
        </text>
      </svg>`;
      return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
    }

    function renderCoverImg(book) {
      const cid = book?.cover_id;
      const alt = `Cover for ${escapeHtml(book?.title || "")}`;
      const fallback = placeholderDataURI(book?.title);

      const hasCover = cid !== null && cid !== undefined && String(cid).trim() !== "" && String(cid) !== "0";
      if (!hasCover) {
        return `<img src="${fallback}" alt="${alt}" class="book-cover-img" />`;
      }

      const src = `https://covers.openlibrary.org/b/id/${cid}-M.jpg`;
      return `<img src="${src}" alt="${alt}" class="book-cover-img"
                  onerror="this.onerror=null; this.src='${fallback}';" />`;
    }

    function renderBooks(books) {
      if (!books || books.length === 0) {
        booksContainer.innerHTML = "<p>No books found.</p>";
        return;
      }

      const booksHTML = books.map(book => `
        <a href="/book/${book.item_idx}">
          <div class="book-card">
            ${renderCoverImg(book)}
            <h3 class="book-title">
              <span class="book-title-text">${escapeHtml(book.title || "")}</span>
            </h3>
            ${book.author ? `<p class="author"><i>${escapeHtml(book.author)}</i></p>` : ""}
            ${book.year != null ? `<p class="year">${escapeHtml(String(book.year))}</p>` : ""}
            ${book.isbn ? `<p class="isbn">${escapeHtml(book.isbn)}</p>` : ""}
          </div>
        </a>
      `).join("");

      booksContainer.innerHTML = `<div class="book-grid">${booksHTML}</div>`;
    }

    function updateURL(page) {
      const urlParams = new URLSearchParams(window.location.search);
      urlParams.set("page", page);
      const newUrl = `${window.location.pathname}?${urlParams}`;
      window.history.replaceState({}, "", newUrl);
    }

    async function fetchPage(page) {
      const urlParams = new URLSearchParams(window.location.search);
      urlParams.set("page", page);

      try {
        const response = await fetch(`/search/json?${urlParams}`);
        const data = await response.json();

        if (data.results?.length > 0) {
          currentPage = page;
          hasNext = data.pagination.has_next;
          hasPrev = data.pagination.has_prev;

          renderBooks(data.results);

          prevBtn.style.display = hasPrev ? "inline-block" : "none";
          nextBtn.style.display = hasNext ? "inline-block" : "none";

          updateURL(page);
          booksContainer.scrollIntoView({ behavior: "smooth", block: "start" });
        } else {
          booksContainer.innerHTML = "<p>No more results.</p>";
          nextBtn.style.display = "none";
        }
      } catch (error) {
        console.error("Fetch error:", error);
        booksContainer.innerHTML = "<p>Error loading results.</p>";
      }
    }

    prevBtn.onclick = () => {
      if (currentPage > 0) fetchPage(currentPage - 1);
    };

    nextBtn.onclick = () => fetchPage(currentPage + 1);

    // Initial render
    renderBooks({{ results | tojson }});

    prevBtn.style.display = hasPrev ? "inline-block" : "none";
    nextBtn.style.display = hasNext ? "inline-block" : "none";
</script>
    </div>
    {% include 'footer.html' %}
</div>

<script type="module">
    import { initSubjectPicker } from "/static/js/subject_picker.js";

    const prefill = {{ (subjects or []) | tojson }};

    initSubjectPicker({
        inputId: "subject-input",
        suggestionsBoxId: "subject-suggestions",
        pillsContainerId: "subject-pills",
        hiddenInputId: "fav_subjects-hidden",
        maxSubjects: 3,
        prefill
    });
</script>

<script>
// Autocomplete functionality
let currentRequest = null;
let selectedSuggestionIndex = -1;

const queryInput = document.getElementById('query');
const suggestionsContainer = document.getElementById('autocomplete-suggestions');

// Debounce function to limit API calls
function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

// Fetch autocomplete suggestions
async function fetchSuggestions(query) {
    if (currentRequest) {
        currentRequest.abort();
    }

    if (query.length < 2) {
        hideSuggestions();
        return;
    }

    showLoading();

    const controller = new AbortController();
    currentRequest = controller;

    try {
        const params = new URLSearchParams({
            q: query,
            limit: 5
        });

        const response = await fetch(`/search/autocomplete?${params}`, {
            signal: controller.signal
        });
        
        const data = await response.json();
        displaySuggestions(data.suggestions);
    } catch (error) {
        if (error.name !== 'AbortError') {
            console.error('Autocomplete error:', error);
            hideSuggestions();
        }
    } finally {
        currentRequest = null;
    }
}

// Display suggestions in the dropdown
function displaySuggestions(suggestions) {
    if (!suggestions || suggestions.length === 0) {
        suggestionsContainer.innerHTML = '<div class="autocomplete-empty">No matches found</div>';
        showSuggestions();
        return;
    }

    const suggestionsHTML = suggestions.map((suggestion, index) => `
        <div class="autocomplete-suggestion" data-index="${index}" data-item-idx="${suggestion.item_idx}">
            <div>
                <div class="suggestion-title">${escapeHtml(suggestion.title)}</div>
                <div class="suggestion-author">${escapeHtml(suggestion.author || 'Unknown Author')}</div>
            </div>
        </div>
    `).join('');

    suggestionsContainer.innerHTML = suggestionsHTML;
    showSuggestions();
    attachSuggestionEvents();
}

// Show loading state
function showLoading() {
    suggestionsContainer.innerHTML = '<div class="autocomplete-loading">Searching...</div>';
    showSuggestions();
}

// Show/hide suggestions
function showSuggestions() {
    suggestionsContainer.style.display = 'block';
}

function hideSuggestions() {
    suggestionsContainer.style.display = 'none';
    selectedSuggestionIndex = -1;
}

// Attach click events to suggestions
function attachSuggestionEvents() {
    const suggestions = suggestionsContainer.querySelectorAll('.autocomplete-suggestion');
    
    suggestions.forEach(suggestion => {
        suggestion.addEventListener('click', () => {
            const title = suggestion.querySelector('.suggestion-title').textContent;
            queryInput.value = title;
            hideSuggestions();
            
            // Optional: Auto-submit form on selection
            // document.getElementById('searchForm').submit();
        });
    });
}

// Keyboard navigation
function handleKeyboardNavigation(e) {
    const suggestions = suggestionsContainer.querySelectorAll('.autocomplete-suggestion');
    
    if (suggestions.length === 0) return;

    switch(e.key) {
        case 'ArrowDown':
            e.preventDefault();
            selectedSuggestionIndex = Math.min(selectedSuggestionIndex + 1, suggestions.length - 1);
            updateSelectedSuggestion(suggestions);
            break;
            
        case 'ArrowUp':
            e.preventDefault();
            selectedSuggestionIndex = Math.max(selectedSuggestionIndex - 1, -1);
            updateSelectedSuggestion(suggestions);
            break;
            
        case 'Enter':
            if (selectedSuggestionIndex >= 0) {
                e.preventDefault();
                suggestions[selectedSuggestionIndex].click();
            }
            break;
            
        case 'Escape':
            hideSuggestions();
            break;
    }
}

function updateSelectedSuggestion(suggestions) {
    suggestions.forEach((suggestion, index) => {
        suggestion.style.backgroundColor = index === selectedSuggestionIndex ? '#e9ecef' : '';
    });
}

// Event listeners
const debouncedFetch = debounce(fetchSuggestions, 300);

queryInput.addEventListener('input', (e) => {
    selectedSuggestionIndex = -1;
    debouncedFetch(e.target.value);
});

queryInput.addEventListener('keydown', handleKeyboardNavigation);

// Close suggestions when clicking outside
document.addEventListener('click', (e) => {
    if (!queryInput.contains(e.target) && !suggestionsContainer.contains(e.target)) {
        hideSuggestions();
    }
});

// Hide suggestions when form is submitted
document.getElementById('searchForm').addEventListener('submit', () => {
    hideSuggestions();
});
</script>

</body>
</html>
