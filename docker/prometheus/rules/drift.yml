groups:
  - name: bookrec_drift
    rules:
      # Fire when any mode is consistently returning zero recommendations.
      # A brief blip (cache miss + cold path) is normal; 5 minutes sustained is not.
      - alert: RecsysEmptyResults
        expr: rate(bookrec_recsys_empty_results_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Recommendation endpoint returning empty results (mode={{ $labels.mode }})"
          description: >
            bookrec_recsys_empty_results_total has been non-zero for 5 minutes for
            mode={{ $labels.mode }}. The candidate pool may have collapsed or the
            model server may be unavailable.

      # Same for similarity.
      - alert: SimilarityEmptyResults
        expr: rate(bookrec_similarity_empty_results_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Similarity endpoint returning empty results (mode={{ $labels.mode }})"
          description: >
            bookrec_similarity_empty_results_total has been non-zero for 5 minutes for
            mode={{ $labels.mode }}. The FAISS index may be unavailable or returning
            no neighbours.

      # p10 of result count dropping below 10 means the bottom 10% of requests
      # are nearly empty — filtering is too aggressive or candidates are sparse.
      - alert: RecsysLowResultCount
        expr: >
          histogram_quantile(0.10,
            sum by (mode, le) (rate(bookrec_recsys_result_count_bucket[10m]))
          ) < 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Recommendation result count p10 below 10 (mode={{ $labels.mode }})"
          description: >
            The 10th percentile of recommendation result counts is below 10 for
            mode={{ $labels.mode }}. This suggests the candidate pool is shrinking,
            possibly due to model degradation or aggressive already-read filtering.

      # Baselines (synthetic requests): subject ~0.8, behavioral ~0.29.
      # Thresholds set at ~35-50% of baseline to stay conservative.

      # subject mode: threshold 0.4 (50% of ~0.8 baseline)
      - alert: RecsysLowMedianScoreSubject
        expr: >
          histogram_quantile(0.5,
            sum by (mode, le) (rate(bookrec_recsys_score_bucket[10m]))
          ) < 0.4 and on(mode) (bookrec_recsys_requests_total{mode="subject"} > 0)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Recommendation median score collapsed for subject mode"
          description: >
            Median recommendation score (subject mode) has been below 0.4 for 10 minutes.
            Baseline is ~0.8. This may indicate a subject embedding or FAISS index issue.

      # behavioral (ALS) mode: threshold 0.1 (33% of ~0.29 baseline)
      - alert: RecsysLowMedianScoreBehavioral
        expr: >
          histogram_quantile(0.5,
            sum by (mode, le) (rate(bookrec_recsys_score_bucket[10m]))
          ) < 0.1 and on(mode) (bookrec_recsys_requests_total{mode="behavioral"} > 0)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Recommendation median score collapsed for behavioral (ALS) mode"
          description: >
            Median recommendation score (behavioral mode) has been below 0.1 for 10 minutes.
            Baseline is ~0.29. This may indicate corrupted or missing ALS factors.

      # Similarity baselines: subject ~0.8, als ~0.32, hybrid ~0.32 (conservative proxy).
      # subject mode: threshold 0.4
      - alert: SimilarityLowMedianScoreSubject
        expr: >
          histogram_quantile(0.5,
            sum by (mode, le) (rate(bookrec_similarity_score_bucket[10m]))
          ) < 0.4 and on(mode) (bookrec_similarity_requests_total{mode="subject"} > 0)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Similarity median score collapsed for subject mode"
          description: >
            Median similarity score (subject mode) has been below 0.4 for 10 minutes.
            Baseline is ~0.8.

      # als and hybrid modes: threshold 0.1
      - alert: SimilarityLowMedianScoreAlsHybrid
        expr: >
          histogram_quantile(0.5,
            sum by (mode, le) (rate(bookrec_similarity_score_bucket[10m]))
          ) < 0.1 and on(mode) (bookrec_similarity_requests_total{mode=~"als|hybrid"} > 0)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Similarity median score collapsed for {{ $labels.mode }} mode"
          description: >
            Median similarity score ({{ $labels.mode }} mode) has been below 0.1 for 10 minutes.
            Baseline is ~0.32.
